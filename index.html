<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- NOTE: update this to your live domain before deploying -->
  <link rel="canonical" href="https://www.closetdesignwizard.com/" />
  <meta name="theme-color" content="#C06D44" />
  <meta name="robots" content="index, follow" />

  <title>Closet Design Wizard | Custom Closets, Kitchens & Garages in Montreal</title>
  <meta name="description"
    content="Design custom closets, kitchens, and garages online. Measure your space with our free 3-step planner, meet a designer live, and get a same-day quote." />
  <meta name="author" content="Closet Design Wizard" />
  <meta name="keywords"
    content="custom closets, walk-in closet design, kitchen cabinets, garage storage, closet design Montreal, space planner" />

  <!-- Open Graph -->
  <meta property="og:title" content="Closet Design Wizard | Custom Closets, Kitchens & Garages" />
  <meta property="og:description"
    content="Design custom closets, kitchens, and garages online. Free 3-step space planner and same-day quotes." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Closet Design Wizard" />
  <meta property="og:locale" content="en_CA" />
  <meta property="og:url" content="https://www.closetdesignwizard.com/" />
  <!-- Add a 1200x630 image at /public/og-image.jpg for rich link previews -->
  <meta property="og:image" content="https://www.closetdesignwizard.com/og-image.jpg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Closet Design Wizard | Custom Closets, Kitchens & Garages" />
  <meta name="twitter:description"
    content="Design custom closets, kitchens, and garages online. Free 3-step space planner and same-day quotes." />
  <meta name="twitter:image" content="https://www.closetdesignwizard.com/og-image.jpg" />

  <!-- Structured data: LocalBusiness + WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "LocalBusiness",
        "@id": "https://www.closetdesignwizard.com/#business",
        "name": "Closet Design Wizard",
        "url": "https://www.closetdesignwizard.com/",
        "email": "info@closetdesignwizard.com",
        "image": "https://www.closetdesignwizard.com/og-image.jpg",
        "priceRange": "$$",
        "telephone": "+1-514-519-0070",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "404 Saint-Jean-Baptiste",
          "addressLocality": "Montreal",
          "addressRegion": "QC",
          "postalCode": "H2Y 3Z9",
          "addressCountry": "CA"
        },
        "areaServed": ["CA", "US"],
        "makesOffer": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Closet Design" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Kitchen Design" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Garage Storage" } }
        ]
      },
      {
        "@type": "WebSite",
        "@id": "https://www.closetdesignwizard.com/#website",
        "url": "https://www.closetdesignwizard.com/",
        "name": "Closet Design Wizard",
        "publisher": { "@id": "https://www.closetdesignwizard.com/#business" }
      }
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
  <script type="text/javascript">
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    })(window.location);
  </script>
</body>

</html>
